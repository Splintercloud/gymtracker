<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#181818;
    color:white;
    padding:20px;
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.card{
    background:#2b2b2b;
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    cursor:pointer;
    transition:.2s;
}

.card:hover{
    transform:scale(1.02);
}

.orange{
    border-left:8px solid #F57C00;
}

.pink{
    border-left:8px solid #E91E63;
}

.page{
    display:none;
}

.active{
    display:block;
}

.back{
    margin-bottom:20px;
    cursor:pointer;
    font-size:18px;
}

.section{
    background:#2b2b2b;
    border-radius:18px;
    margin-bottom:25px;
    overflow:hidden;
}

.header{
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.orangeHeader{
    background:#F57C00;
}

.pinkHeader{
    background:#E91E63;
}

.blueHeader{
    background:#1976D2;
}

.content{
    padding:20px;
}

.exercise{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 0;
    border-bottom:1px solid #444;
}

.exercise:last-child{
    border:none;
}

input{
    width:70px;
    background:#3a3a3a;
    color:white;
    border:none;
    border-radius:8px;
    text-align:center;
    padding:8px;
    font-size:16px;
}
</style>
</head>

<body>

<div id="home" class="active">

<h1>🏋️ GymTracker</h1>

<div class="card orange" onclick="showPage('sascha')">
<h2>🟠 Sascha</h2>
<p>Trainingsplan öffnen</p>
</div>

<div class="card pink" onclick="showPage('marie')">
<h2>🩷 Marie</h2>
<p>Trainingsplan öffnen</p>
</div>

</div>

<div id="sascha" class="page">

<div class="back" onclick="backHome()">← Zurück</div>

</div>

<div id="marie" class="page">

<div class="back" onclick="backHome()">← Zurück</div>

</div>

<script>

function showPage(id){

document.getElementById("home").classList.remove("active");

document.getElementById("sascha").classList.remove("active");

document.getElementById("marie").classList.remove("active");

document.getElementById(id).classList.add("active");

}

function backHome(){

document.getElementById("sascha").classList.remove("active");

document.getElementById("marie").classList.remove("active");

document.getElementById("home").classList.add("active");

}

</script>

</body>
</html>
